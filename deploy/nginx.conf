# GitGuild 前端容器 nginx 配置
# - 托管 Vite 构建出的 SPA（history 路由回退到 index.html）
# - 同源反代 /api 与 /uploads 到 backend 容器，因此浏览器无 CORS、IP 变化无需改前端

server {
    listen 80;
    server_name _;

    # 头像等上传走 multipart，放开请求体大小限制
    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    # 后端 REST：前端默认 base 为 /api/v1（见 httpClient.js）
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;   # 仓库迁移等慢请求（首次导入大仓库可能数分钟）
    }

    # 后端静态资源（上传文件）
    location /uploads/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA history 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
