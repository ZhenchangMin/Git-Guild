name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 前端构建任务
  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend  # 关键：所有命令在 frontend/ 目录执行
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json  # 关键：指定锁文件路径
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint || true  # 如果没有 lint 脚本，暂时忽略错误
      
      - name: Build frontend
        run: npm run build || true  # 如果前端还没配置 build，暂时忽略

  # 后端构建任务（你们的核心）
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend  # 关键：所有命令在 backend/ 目录执行
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven
        run: mvn -B clean package --file pom.xml
      
      - name: Run tests
        run: mvn test

  # 安全审计（仅前端，暂时）
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm audit --audit-level=high || true