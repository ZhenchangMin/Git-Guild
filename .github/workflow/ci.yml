name: 基础CI检查

on: [push, pull_request]  # 提交代码或发起合并时自动运行

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: pip install flake8

      - name: 代码风格检查
        run: flake8 .  # 检查格式是否规范

      - name: 代码编译/语法检查
        run: python -m py_compile *.py