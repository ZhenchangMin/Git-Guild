spring:
  datasource:
    url: jdbc:h2:mem:gitguild-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  data:
    redis:
      repositories:
        enabled: false

jwt:
  secret: test-secret-for-gitguild-auth-module-32bytes
  expiration-ms: 3600000
  refresh-expiration-ms: 86400000
