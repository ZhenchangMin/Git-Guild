version: "3.7"

# 固定 compose 项目名 → 卷名恒为 gitguild_*（与目录名无关），
# 这样 scripts/bootstrap.sh 能可靠地把 Gitea 快照灌进 gitguild_gitea-data。
name: gitguild

services:
  mysql:
    image: mysql:8.0
    container_name: gitguild-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: gitguild
      MYSQL_USER: ${MYSQL_USER:-gitguild}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gitguild123}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # 空卷首次启动时自动灌入「最短 MVP 起点」数据（3 用户 + 仓库 + Issue#1，0 quests）
      - ./seed/mysql-seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gitguild-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gitea:
    image: gitea/gitea:1.22
    container_name: gitguild-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__ROOT_URL=http://localhost:3000/
      - GITEA__webhook__ALLOWED_HOST_LIST=*
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  gitea-data:
