version: "3.7"

# 跨平台、跨 compose 版本：不使用 v2 专属特性（顶层 name: / depends_on 条件），
# 因此 `docker compose up -d`（Docker Desktop 的 v2）与老的 `docker-compose up -d`（v1）都能用。
# 数据「还原」全部内置在容器里 —— WSL / PowerShell / macOS 都只跑这一条命令，无需任何 shell 脚本。

services:
  mysql:
    image: mysql:8.0
    container_name: gitguild-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: gitguild
      MYSQL_USER: ${MYSQL_USER:-gitguild}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gitguild123}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # 空卷首次启动时自动灌入「最短 MVP 起点」（3 用户 + 仓库 + Issue#1，0 quests）。
      # MySQL 官方镜像只在数据目录为空时执行 initdb 脚本，故幂等。
      - ./seed/mysql-seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gitguild-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gitea:
    image: gitea/gitea:1.22
    container_name: gitguild-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__ROOT_URL=http://localhost:3000/
      - GITEA__webhook__ALLOWED_HOST_LIST=*
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea-data:/data
      - ./seed:/seed:ro
    # 自播种：卷为空（无 gitea.db）时，先把随仓库分发的快照解进 /data，再走 Gitea 正常启动。
    # 幂等（已有数据则跳过），且不依赖任何 compose 编排条件 —— v1/v2 通用。
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'if [ ! -f /data/gitea/gitea.db ]; then echo "[seed] 还原 Gitea 快照（spike-admin / hello-world-mvp / Issue#1）..."; tar xzf /seed/gitea-data.tar.gz -C /data && chown -R 1000:1000 /data && echo "[seed] 完成"; fi; exec /usr/bin/entrypoint /bin/s6-svscan /etc/s6'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  gitea-data:
