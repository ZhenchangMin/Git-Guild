stages:
  - quality
  - build
  - verify
  - package

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_ID

quality:
  stage: quality
  image: node:22
  script:
    - node scripts/ci-static-check.mjs

frontend_build:
  stage: build
  image: node:22
  needs:
    - quality
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm/
  before_script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run build
  artifacts:
    name: frontend-dist
    when: always
    expire_in: 7 days
    paths:
      - frontend/dist/

backend_verify:
  stage: verify
  image: eclipse-temurin:17-jdk
  needs:
    - quality
  cache:
    key: maven
    paths:
      - .m2/repository/
  before_script:
    - cd backend
    - chmod +x ./mvnw
  script:
    - ./mvnw -B -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository verify
  artifacts:
    name: backend-verification
    when: always
    expire_in: 7 days
    paths:
      - backend/target/*.jar
      - backend/target/surefire-reports/
      - backend/target/site/jacoco/
    reports:
      junit:
        - backend/target/surefire-reports/TEST-*.xml

package_check:
  stage: package
  image: eclipse-temurin:17-jdk
  needs:
    - job: backend_verify
      artifacts: true
    - job: frontend_build
      artifacts: true
  script:
    - test -d frontend/dist
    - test -n "$(find backend/target -maxdepth 1 -name '*.jar' -print -quit)"
